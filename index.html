<!DOCTYPE html>
<html>
<head>
    <title>UPSC Quiz App</title>

    <style>
        body {
            font-family: Arial;
            background: linear-gradient(to right, #4facfe, #00f2fe);
            text-align: center;
        }

        .quiz-container {
            background: white;
            width: 50%;
            margin: 50px auto;
            padding: 25px;
            border-radius: 15px;
            box-shadow: 0 0 15px rgba(0,0,0,0.2);
        }

        button {
            padding: 10px;
            margin: 5px;
            border-radius: 8px;
            border: none;
            background: #4facfe;
            color: white;
            cursor: pointer;
        }

        button:hover {
            background: #007bff;
        }

        #timer {
            font-weight: bold;
            color: red;
        }
    </style>

</head>

<body>

<div class="quiz-container">
    <h3 id="progress"></h3>
    <h2 id="question"></h2>

    <p>Time Left: <span id="timer">10</span> sec</p>

    <div id="answers"></div>

    <p id="result"></p>
</div>

<script>
const quiz = [
    {
        question: "Who is known as the Father of Indian Constitution?",
        answers: ["Mahatma Gandhi", "B.R. Ambedkar", "Nehru", "Rajendra Prasad"],
        correct: 1
    },
    {
        question: "Which is the largest state in India?",
        answers: ["Maharashtra", "UP", "Rajasthan", "MP"],
        correct: 2
    },
    {
        question: "Fundamental Rights are in which Article?",
        answers: ["Article 12-35", "Article 40", "Article 50", "Article 60"],
        correct: 0
    }
];

let current = 0;
let score = 0;
let timer;
let timeLeft = 10;
let answered = false;

function loadQuestion() {
    answered = false;
    timeLeft = 10;
    document.getElementById("timer").innerText = timeLeft;

    document.getElementById("progress").innerText =
        "Question " + (current + 1) + " of " + quiz.length;

    document.getElementById("question").innerText = quiz[current].question;

    let answersDiv = document.getElementById("answers");
    answersDiv.innerHTML = "";

    document.getElementById("result").innerText = "";

    quiz[current].answers.forEach((ans, index) => {
        let btn = document.createElement("button");
        btn.innerText = ans;
        btn.onclick = () => checkAnswer(index);
        answersDiv.appendChild(btn);
    });

    startTimer();
}

function startTimer() {
    clearInterval(timer);
    timer = setInterval(() => {
        timeLeft--;
        document.getElementById("timer").innerText = timeLeft;

        if (timeLeft === 0) {
            clearInterval(timer);
            autoNext();
        }
    }, 1000);
}

function checkAnswer(index) {
    if (answered) return;

    answered = true;
    clearInterval(timer);

    let result = document.getElementById("result");

    if (index === quiz[current].correct) {
        score++;
        result.innerText = "Correct ✅";
        result.style.color = "green";
    } else {
        result.innerText = "Wrong ❌";
        result.style.color = "red";
    }

    setTimeout(nextQuestion, 1000);
}

function autoNext() {
    document.getElementById("result").innerText = "Time's up ⏰";
    document.getElementById("result").style.color = "orange";
    setTimeout(nextQuestion, 1000);
}

function nextQuestion() {
    current++;

    if (current < quiz.length) {
        loadQuestion();
    } else {
        showResult();
    }
}

function showResult() {
    let percentage = (score / quiz.length) * 100;

    document.querySelector(".quiz-container").innerHTML =
        "<h2>Your Score: " + score + "/" + quiz.length + "</h2>" +
        "<h3>Percentage: " + percentage.toFixed(2) + "%</h3>" +
        "<button onclick='restartQuiz()'>Restart</button>";
}

function restartQuiz() {
    current = 0;
    score = 0;
    loadQuestion();
}

loadQuestion();
</script>

</body>
</html>
