<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Enterprise Registration | Experiment 09</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        :root {
            --primary: #4f46e5;
            --primary-hover: #4338ca;
            --bg: #0f172a;
            --surface: #ffffff;
            --text: #1e293b;
            --text-muted: #64748b;
            --border: #e2e8f0;
            --input-bg: #f8fafc;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: 'Outfit', sans-serif;
            background: linear-gradient(135deg, #0f172a 0%, #1e1b4b 100%);
            color: var(--text);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 40px 20px;
        }

        .auth-container {
            width: 100%;
            max-width: 1000px;
            background: var(--surface);
            border-radius: 32px;
            overflow: hidden;
            display: flex;
            box-shadow: 0 40px 100px -20px rgba(0, 0, 0, 0.5);
        }

        .auth-sidebar {
            flex: 1;
            background: #4f46e5;
            padding: 60px;
            color: white;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            position: relative;
            overflow: hidden;
        }

        .auth-sidebar::after {
            content: '';
            position: absolute;
            bottom: -100px;
            right: -100px;
            width: 300px;
            height: 300px;
            background: rgba(255, 255, 255, 0.1);
            border-radius: 50%;
        }

        .sidebar-header {
            display: flex;
            align-items: center;
            gap: 12px;
            font-weight: 700;
            font-size: 1.25rem;
        }

        .sidebar-content h2 {
            font-size: 2.5rem;
            line-height: 1.2;
            margin-bottom: 20px;
        }

        .sidebar-content p {
            color: rgba(255, 255, 255, 0.8);
            font-size: 1.1rem;
        }

        .auth-form-section {
            flex: 1.2;
            padding: 60px;
            background: white;
        }

        .form-header {
            margin-bottom: 40px;
        }

        .form-header h1 {
            font-size: 2rem;
            font-weight: 700;
            color: #0f172a;
            margin-bottom: 8px;
        }

        .form-header p {
            color: var(--text-muted);
        }

        .form-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px;
        }

        .full-width { grid-column: span 2; }

        .form-group {
            margin-bottom: 20px;
        }

        label {
            display: block;
            font-weight: 600;
            font-size: 0.9rem;
            margin-bottom: 8px;
            color: #475569;
        }

        input[type="text"],
        input[type="email"],
        input[type="date"],
        select {
            width: 100%;
            padding: 14px 16px;
            border-radius: 12px;
            border: 1px solid var(--border);
            background: var(--input-bg);
            font-family: inherit;
            font-size: 1rem;
            transition: all 0.2s;
        }

        input:focus, select:focus {
            outline: none;
            border-color: var(--primary);
            background: white;
            box-shadow: 0 0 0 4px rgba(79, 70, 229, 0.1);
        }

        .radio-group {
            display: flex;
            gap: 20px;
            margin-top: 5px;
        }

        .radio-item {
            display: flex;
            align-items: center;
            gap: 8px;
            cursor: pointer;
            font-size: 0.95rem;
            color: var(--text-muted);
        }

        .btn-submit {
            width: 100%;
            background: var(--primary);
            color: white;
            padding: 16px;
            border-radius: 12px;
            border: none;
            font-weight: 700;
            font-size: 1rem;
            cursor: pointer;
            transition: all 0.2s;
            margin-top: 20px;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
        }

        .btn-submit:hover {
            background: var(--primary-hover);
            transform: translateY(-2px);
            box-shadow: 0 10px 20px rgba(79, 70, 229, 0.3);
        }

        @media (max-width: 900px) {
            .auth-container { flex-direction: column; }
            .auth-sidebar { display: none; }
            .form-grid { grid-template-columns: 1fr; }
            .full-width { grid-column: span 1; }
        }
    </style>
</head>
<body>

    <div class="auth-container">
        <div class="auth-sidebar">
            <div class="sidebar-header">
                <i data-lucide="shield-check"></i>
                <span>Nexus Systems</span>
            </div>
            <div class="sidebar-content">
                <h2>Join the next generation of enterprise.</h2>
                <p>Complete your registration to access the laboratory dashboard and project metrics.</p>
            </div>
            <div style="font-size: 0.85rem; color: rgba(255, 255, 255, 0.6);">
                &copy; 2025 Nexus Lab Systems
            </div>
        </div>

        <div class="auth-form-section">
            <div class="form-header">
                <h1>Create Account</h1>
                <p>Please enter your professional details to continue.</p>
            </div>

            <form action="#" method="post">
                <div class="form-grid">
                    <div class="form-group">
                        <label for="fname">First Name</label>
                        <input type="text" id="fname" name="fname" placeholder="John" required>
                    </div>
                    <div class="form-group">
                        <label for="lname">Last Name</label>
                        <input type="text" id="lname" name="lname" placeholder="Doe" required>
                    </div>
                    
                    <div class="form-group full-width">
                        <label for="email">Work Email</label>
                        <input type="email" id="email" name="email" placeholder="john@company.com" required>
                    </div>

                    <div class="form-group">
                        <label>Gender</label>
                        <div class="radio-group">
                            <label class="radio-item"><input type="radio" name="gender" value="male"> Male</label>
                            <label class="radio-item"><input type="radio" name="gender" value="female"> Female</label>
                        </div>
                    </div>

                    <div class="form-group">
                        <label for="dept">Department</label>
                        <select id="dept" name="dept">
                            <option value="it">Information Technology</option>
                            <option value="cs">Computer Science</option>
                            <option value="ds">Data Science</option>
                        </select>
                    </div>

                    <div class="form-group">
                        <label for="doj">Date of Joining</label>
                        <input type="date" id="doj" name="doj">
                    </div>

                    <div class="form-group">
                        <label for="resume">Credentials</label>
                        <input type="file" id="resume" name="resume" style="padding: 10px; font-size: 0.8rem;">
                    </div>
                </div>

                <button type="submit" class="btn-submit">
                    Complete Registration <i data-lucide="arrow-right"></i>
                </button>
            </form>
        </div>
    </div>

    <script>
        lucide.createIcons();
    </script>
</body>
</html>
